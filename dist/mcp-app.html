<body>
  <main id="app-main" class="app-main">

    <!-- Formulario agregar/editar -->
    <section class="form-section">
      <h2 id="form-title" class="form-title">Nuevo Pendiente</h2>
      <form id="todo-form" class="todo-form" novalidate>
        <input type="hidden" id="edit-id" value="">
        <div class="field">
          <label for="input-title">Título <span class="required">*</span></label>
          <input
            type="text"
            id="input-title"
            placeholder="¿Qué necesitas hacer?"
            autocomplete="off"
            required
          >
          <span id="title-error" class="field-error" hidden>El título es obligatorio.</span>
        </div>
        <div class="field">
          <label for="input-description">Descripción <span class="optional">(opcional)</span></label>
          <textarea id="input-description" placeholder="Detalles adicionales..." rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary">Agregar</button>
          <button type="button" id="cancel-btn" class="btn btn-ghost" hidden>Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Filtros -->
    <section class="filter-section">
      <div class="filters" role="tablist" aria-label="Filtrar pendientes">
        <button role="tab" class="filter-btn active" data-filter="all" aria-selected="true">Todos</button>
        <button role="tab" class="filter-btn" data-filter="pending" aria-selected="false">Pendientes</button>
        <button role="tab" class="filter-btn" data-filter="completed" aria-selected="false">Completados</button>
      </div>
      <span id="todo-count" class="todo-count"></span>
    </section>

    <!-- Lista de pendientes -->
    <section id="todo-list-section" class="list-section" aria-live="polite">
      <ul id="todo-list" class="todo-list"></ul>
      <p id="empty-state" class="empty-state" hidden>No hay pendientes en esta vista.</p>
    </section>

    <!-- Diálogo de confirmación de eliminación -->
    <dialog id="confirm-dialog" class="confirm-dialog">
      <div class="dialog-content">
        <p id="confirm-message">¿Estás seguro de que deseas eliminar este pendiente?</p>
        <div class="dialog-actions">
          <button id="confirm-ok" class="btn btn-danger">Eliminar</button>
          <button id="confirm-cancel" class="btn btn-ghost">Cancelar</button>
        </div>
      </div>
    </dialog>

  </main>

</body>
</html>
